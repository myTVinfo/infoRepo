name: Build playlist-final.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"   # toutes les 6h
  push:
    paths:
      - "sources.txt"
      - "scripts/**"
      - ".github/workflows/build-playlist.yml"

permissions:
  contents: write

concurrency:
  group: build-playlist
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (none)
        run: python -V

      - name: Build playlist-final.m3u
        run: python scripts/merge_playlists.py

      - name: Validate output (must look like M3U and have entries)
        run: |
          test -f playlist-final.m3u
          head -n 1 playlist-final.m3u | grep -q '^#EXTM3U'
          # au moins 10 entrées EXTINF (ajuste si tu veux)
          test "$(grep -c '^#EXTINF' playlist-final.m3u)" -ge 10

      - name: Commit playlist-final.m3u
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add playlist-final.m3u
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update playlist-final.m3u"
          git push
